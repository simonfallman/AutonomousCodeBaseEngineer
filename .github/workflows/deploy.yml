name: Deploy ACE

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/ace || (mkdir -p /opt/ace && cd /opt/ace)

            # Pull latest code
            if [ -d ".git" ]; then
              git pull
            else
              git clone https://github.com/simonfallman/AutonomousCodeBaseEngineer.git .
            fi

            # Stop existing container
            docker stop ace 2>/dev/null || true
            docker rm ace 2>/dev/null || true

            # Build new image
            docker build -t ace .

            # Run container
            docker run -d \
              --name ace \
              --restart unless-stopped \
              -p 127.0.0.1:3001:3001 \
              -e MCP_TRANSPORT=sse \
              -e PORT=3001 \
              -e REPO_PATH=/opt/ace \
              -e AWS_REGION=${{ secrets.AWS_REGION || 'us-east-1' }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e DATABASE_URL=postgresql://postgres:${{ secrets.DB_PASSWORD }}@172.17.0.1:5432/ace \
              -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
              ace

            echo "Deploy complete"
