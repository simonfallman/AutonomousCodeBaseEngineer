name: Deploy ACE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GITHUB_TOKEN_SECRET: ${{ secrets.GH_TOKEN }}
        run: |
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key $USER@$HOST << EOF
            set -e

            if [ -d /opt/ace/.git ]; then
              cd /opt/ace
              git remote set-url origin https://x-access-token:$GITHUB_TOKEN_SECRET@github.com/simonfallman/AutonomousCodeBaseEngineer.git
              git pull
            else
              mkdir -p /opt/ace && git clone https://x-access-token:$GITHUB_TOKEN_SECRET@github.com/simonfallman/AutonomousCodeBaseEngineer.git /opt/ace
            fi

            cd /opt/ace

            docker stop ace 2>/dev/null || true
            docker rm ace 2>/dev/null || true
            docker build -t ace .

            docker run -d \
              --name ace \
              --restart unless-stopped \
              -p 127.0.0.1:3001:3001 \
              -e MCP_TRANSPORT=sse \
              -e PORT=3001 \
              -e REPO_PATH=/opt/ace \
              -e AWS_REGION=us-east-1 \
              -e AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID \
              -e AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY \
              -e DATABASE_URL=postgresql://postgres:$DB_PASSWORD@172.17.0.1:5432/ace \
              -e GITHUB_TOKEN=$GITHUB_TOKEN_SECRET \
              ace

            echo "Deploy complete"
          EOF
